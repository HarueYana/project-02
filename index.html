<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コヒー</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0e0c0a;
    --paper: #f5f3ef;
    --muted: #7a7570;
  }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Shippori Mincho', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Cover ── */
  #cover {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #2a2520 0%, #0a0806 100%);
    cursor: pointer;
  }

  .cover-inner {
    text-align: center;
    animation: fadeUp 2s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cover-title {
    writing-mode: vertical-rl;
    font-size: clamp(2.8rem, 6vw, 5rem);
    font-weight: 400;
    letter-spacing: 0.5em;
    color: var(--paper);
    margin-bottom: 2rem;
  }

  .cover-sub {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: var(--muted);
  }

  .start-btn {
    display: inline-block;
    margin-top: 2.5rem;
    padding: 0.7rem 2.5rem;
    border: 1px solid rgba(245,243,239,0.2);
    color: var(--paper);
    font-family: 'Shippori Mincho', serif;
    font-size: 0.8rem;
    letter-spacing: 0.35em;
    cursor: pointer;
    background: transparent;
    transition: all 0.35s;
  }
  .start-btn:hover {
    background: rgba(245,243,239,0.07);
    border-color: rgba(245,243,239,0.45);
  }

  /* ── Viewer ── */
  #viewer {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 0 0 6rem;
  }

  /* Each page wrapper */
  .page-wrap {
    width: 100%;
    max-width: 1200px;
    padding: 4vh 4vw;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.75s ease, transform 0.75s ease;
  }
  .page-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .page-wrap canvas {
    max-width: 100%;
    height: auto;
    display: block;
    box-shadow: 0 4px 60px rgba(0,0,0,0.7), 0 0 120px rgba(0,0,0,0.35);
  }

  /* ── Fixed nav bar ── */
  #nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 0.9rem 1.5rem 1.1rem;
    background: linear-gradient(to top, rgba(10,8,6,0.97) 60%, transparent);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #nav.show { opacity: 1; pointer-events: all; }

  .nav-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(245,243,239,0.18);
    background: rgba(245,243,239,0.06);
    color: var(--paper);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: rgba(245,243,239,0.15); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  #page-indicator {
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    color: var(--muted);
    min-width: 55px;
    text-align: center;
  }

  /* Thumbnail strip */
  #thumb-toggle {
    padding: 0.3rem 0.9rem;
    border: 1px solid rgba(245,243,239,0.15);
    background: transparent;
    color: var(--muted);
    font-family: 'Shippori Mincho', serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: all 0.2s;
  }
  #thumb-toggle:hover { color: var(--paper); border-color: rgba(245,243,239,0.4); }

  #thumbnails {
    position: fixed;
    bottom: 58px; left: 0; right: 0;
    background: rgba(10,8,6,0.97);
    display: flex;
    gap: 6px;
    padding: 14px 16px;
    overflow-x: auto;
    z-index: 199;
    transform: translateY(100%);
    opacity: 0;
    transition: transform 0.35s ease, opacity 0.35s;
    scrollbar-width: thin;
    scrollbar-color: rgba(245,243,239,0.15) transparent;
  }
  #thumbnails.open { transform: translateY(0); opacity: 1; }

  .thumb {
    flex-shrink: 0;
    width: 72px; height: 52px;
    border: 1px solid rgba(245,243,239,0.1);
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s, transform 0.2s;
  }
  .thumb:hover { transform: scale(1.06); }
  .thumb.active { border-color: rgba(245,243,239,0.65); }
  .thumb canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-n {
    position: absolute;
    bottom: 2px; right: 4px;
    font-size: 8px;
    color: rgba(245,243,239,0.45);
  }

  /* Loading state */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--ink);
    align-items: center;
    justify-content: center;
    z-index: 300;
    flex-direction: column;
    gap: 1.5rem;
  }
  #loading.show { display: flex; }

  .loading-text {
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    color: var(--muted);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .progress-bar {
    width: 160px;
    height: 1px;
    background: rgba(245,243,239,0.12);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--paper);
    width: 0%;
    transition: width 0.3s ease;
  }

  #back-top {
    display: block;
    text-align: center;
    padding: 3rem 0 1rem;
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
  }
  #back-top:hover { color: var(--paper); }
</style>
</head>
<body>

<div id="loading">
  <p class="loading-text">読み込み中</p>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<section id="cover">
  <div class="cover-inner">
    <h1 class="cover-title">コヒー</h1>
    <p class="cover-sub">visual book</p>
    <button class="start-btn" id="start-btn">読む &nbsp;›</button>
  </div>
</section>

<section id="viewer"></section>

<nav id="nav">
  <button class="nav-btn" id="prev-btn" disabled>‹</button>
  <span id="page-indicator">— / —</span>
  <button class="nav-btn" id="next-btn">›</button>
  <button id="thumb-toggle">目次</button>
</nav>

<div id="thumbnails"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL = 'kohii.pdf';
  const cover   = document.getElementById('cover');
  const viewer  = document.getElementById('viewer');
  const nav     = document.getElementById('nav');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const indicator   = document.getElementById('page-indicator');
  const thumbToggle = document.getElementById('thumb-toggle');
  const thumbsEl    = document.getElementById('thumbnails');
  const loading     = document.getElementById('loading');
  const progressFill = document.getElementById('progress-fill');

  let pdfDoc = null;
  let totalPages = 0;
  let currentPage = 1;
  let thumbOpen = false;
  let loaded = false;

  /* ── Load PDF on demand ── */
  document.getElementById('start-btn').addEventListener('click', async () => {
    if (loaded) { showViewer(); return; }
    loading.classList.add('show');

    try {
      const loadingTask = pdfjsLib.getDocument(PDF_URL);
      loadingTask.onProgress = ({ loaded: l, total }) => {
        if (total) progressFill.style.width = Math.round(l / total * 100) + '%';
      };
      pdfDoc = await loadingTask.promise;
      totalPages = pdfDoc.numPages;
      await renderAllPages();
      loaded = true;
      loading.classList.remove('show');
      showViewer();
    } catch(e) {
      loading.classList.remove('show');
      alert('PDFの読み込みに失敗しました。\nkohii.pdf が同じフォルダにあるか確認してください。');
      console.error(e);
    }
  });

  function showViewer() {
    cover.style.display = 'none';
    viewer.style.display = 'flex';
    nav.classList.add('show');
    goTo(1);
  }

  /* ── Render all pages ── */
  async function renderAllPages() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const viewportWidth = Math.min(window.innerWidth * 0.92, 1200);

    for (let i = 1; i <= totalPages; i++) {
      const page = await pdfDoc.getPage(i);
      const baseVP = page.getViewport({ scale: 1 });
      const scale  = (viewportWidth / baseVP.width) * dpr;
      const vp     = page.getViewport({ scale });

      // Main canvas
      const canvas = document.createElement('canvas');
      canvas.width  = vp.width;
      canvas.height = vp.height;
      canvas.style.width  = Math.round(vp.width  / dpr) + 'px';
      canvas.style.height = Math.round(vp.height / dpr) + 'px';
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

      const wrap = document.createElement('div');
      wrap.className = 'page-wrap';
      wrap.dataset.page = i;
      wrap.id = 'p' + i;
      wrap.appendChild(canvas);
      viewer.appendChild(wrap);

      // Thumbnail canvas
      const thumbScale = 72 / baseVP.width * dpr;
      const tvp = page.getViewport({ scale: thumbScale });
      const tc  = document.createElement('canvas');
      tc.width  = tvp.width;
      tc.height = tvp.height;
      tc.style.width  = '72px';
      tc.style.height = '52px';
      await page.render({ canvasContext: tc.getContext('2d'), viewport: tvp }).promise;

      const thumbDiv = document.createElement('div');
      thumbDiv.className = 'thumb';
      thumbDiv.dataset.page = i;
      thumbDiv.appendChild(tc);
      const tn = document.createElement('span');
      tn.className = 'thumb-n';
      tn.textContent = i;
      thumbDiv.appendChild(tn);
      thumbDiv.addEventListener('click', () => goTo(i));
      thumbsEl.appendChild(thumbDiv);

      progressFill.style.width = Math.round(i / totalPages * 100) + '%';
    }

    // Back-to-top link
    const back = document.createElement('a');
    back.id = 'back-top';
    back.textContent = '▲ 表紙へ戻る';
    back.addEventListener('click', () => {
      viewer.style.display = 'none';
      cover.style.display = 'flex';
      nav.classList.remove('show');
      if (thumbOpen) toggleThumbs();
    });
    viewer.appendChild(back);

    // Intersection observer for fade-in + nav update
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          const pg = parseInt(e.target.dataset.page);
          if (pg) { currentPage = pg; updateNav(); }
        }
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('.page-wrap').forEach(w => io.observe(w));
  }

  function goTo(n) {
    const el = document.getElementById('p' + n);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (thumbOpen) toggleThumbs();
  }

  function updateNav() {
    indicator.textContent = currentPage + ' / ' + totalPages;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    document.querySelectorAll('.thumb').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.page) === currentPage);
    });
  }

  prevBtn.addEventListener('click', () => currentPage > 1 && goTo(currentPage - 1));
  nextBtn.addEventListener('click', () => currentPage < totalPages && goTo(currentPage + 1));

  function toggleThumbs() {
    thumbOpen = !thumbOpen;
    thumbsEl.classList.toggle('open', thumbOpen);
    thumbToggle.textContent = thumbOpen ? '閉じる' : '目次';
  }
  thumbToggle.addEventListener('click', toggleThumbs);

  document.addEventListener('keydown', e => {
    if (!loaded) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextBtn.click(); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); prevBtn.click(); }
    if (e.key === 'Escape' && thumbOpen) toggleThumbs();
  });
</script>
</body>
</html>

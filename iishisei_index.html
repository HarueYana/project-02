<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>いい姿勢はいい作業を生む</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky: #6bbcd8;
    --sky-dark: #3a8fb5;
    --ink: #1c1a18;
    --white: #ffffff;
    --gray: #f0eeea;
    --muted: #8a8a8a;
  }

  body {
    background: var(--white);
    color: var(--ink);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Cover ── */
  #cover {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--sky);
    position: relative;
    overflow: hidden;
  }

  /* decorative corner marks like the PDF */
  #cover::before, #cover::after {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    border: 1.5px solid rgba(255,255,255,0.4);
  }
  #cover::before { top: 24px; left: 24px; border-right: none; border-bottom: none; }
  #cover::after  { bottom: 24px; right: 24px; border-left: none; border-top: none; }

  .cover-card {
    background: var(--white);
    padding: 3rem 3.5rem;
    max-width: 520px;
    width: 88%;
    text-align: center;
    animation: popIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    position: relative;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.88) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .cover-title {
    font-size: clamp(1.6rem, 4.5vw, 2.6rem);
    font-weight: 700;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 0.6rem;
  }

  .cover-author {
    font-size: 0.85rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 2rem;
  }

  .start-btn {
    display: inline-block;
    padding: 0.75rem 2.5rem;
    background: var(--sky);
    color: var(--white);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.15s;
  }
  .start-btn:hover {
    background: var(--sky-dark);
    transform: translateY(-1px);
  }
  .start-btn:active { transform: scale(0.97); }

  /* ── Viewer ── */
  #viewer {
    display: none;
    flex-direction: column;
    align-items: center;
    background: var(--gray);
    padding: 0 0 7rem;
  }

  .page-wrap {
    width: 100%;
    max-width: 1100px;
    padding: 3.5vh 3vw;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.65s ease, transform 0.65s ease;
  }
  .page-wrap.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .page-wrap canvas {
    max-width: 100%;
    height: auto;
    display: block;
    background: var(--white);
    box-shadow: 0 2px 24px rgba(0,0,0,0.12), 0 8px 48px rgba(0,0,0,0.06);
  }

  /* ── Nav ── */
  #nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 0.8rem 1.5rem 1rem;
    background: var(--white);
    border-top: 1px solid rgba(0,0,0,0.08);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    box-shadow: 0 -2px 20px rgba(0,0,0,0.06);
  }
  #nav.show { opacity: 1; pointer-events: all; }

  .nav-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.15);
    background: var(--white);
    color: var(--ink);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: var(--sky); color: var(--white); border-color: var(--sky); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-btn:disabled:hover { background: var(--white); color: var(--ink); border-color: rgba(0,0,0,0.15); }

  #page-indicator {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    min-width: 55px;
    text-align: center;
  }

  #thumb-toggle {
    padding: 0.3rem 1rem;
    border: 1.5px solid rgba(0,0,0,0.15);
    background: transparent;
    color: var(--muted);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.18s;
  }
  #thumb-toggle:hover { background: var(--sky); color: var(--white); border-color: var(--sky); }

  /* Thumbnails */
  #thumbnails {
    position: fixed;
    bottom: 58px; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid rgba(0,0,0,0.08);
    display: flex;
    gap: 6px;
    padding: 12px 16px;
    overflow-x: auto;
    z-index: 199;
    transform: translateY(100%);
    opacity: 0;
    transition: transform 0.35s ease, opacity 0.35s;
    scrollbar-width: thin;
    scrollbar-color: var(--sky) transparent;
  }
  #thumbnails.open { transform: translateY(0); opacity: 1; }

  .thumb {
    flex-shrink: 0;
    width: 72px; height: 52px;
    border: 1.5px solid rgba(0,0,0,0.1);
    cursor: pointer;
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s, transform 0.2s;
    background: var(--white);
  }
  .thumb:hover { transform: scale(1.06); border-color: var(--sky); }
  .thumb.active { border-color: var(--sky); border-width: 2px; }
  .thumb canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-n {
    position: absolute;
    bottom: 2px; right: 4px;
    font-size: 8px;
    color: var(--muted);
  }

  /* Loading */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--sky);
    align-items: center;
    justify-content: center;
    z-index: 300;
    flex-direction: column;
    gap: 1.5rem;
  }
  #loading.show { display: flex; }

  .loading-text {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--white);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .progress-bar {
    width: 160px; height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--white);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  #back-top {
    display: block;
    text-align: center;
    padding: 3rem 0 1.5rem;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--sky);
    text-decoration: none;
    transition: color 0.2s;
    cursor: pointer;
  }
  #back-top:hover { color: var(--sky-dark); }
</style>
</head>
<body>

<div id="loading">
  <p class="loading-text">読み込み中</p>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<section id="cover">
  <div class="cover-card">
    <h1 class="cover-title">いい姿勢は<br>いい作業を生む</h1>
    <p class="cover-author">梁 晴恵　文・絵</p>
    <button class="start-btn" id="start-btn">読む &nbsp;›</button>
  </div>
</section>

<section id="viewer"></section>

<nav id="nav">
  <button class="nav-btn" id="prev-btn" disabled>‹</button>
  <span id="page-indicator">— / —</span>
  <button class="nav-btn" id="next-btn">›</button>
  <button id="thumb-toggle">目次</button>
</nav>

<div id="thumbnails"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const PDF_URL = 'iishisei.pdf';
  const cover   = document.getElementById('cover');
  const viewer  = document.getElementById('viewer');
  const nav     = document.getElementById('nav');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const indicator   = document.getElementById('page-indicator');
  const thumbToggle = document.getElementById('thumb-toggle');
  const thumbsEl    = document.getElementById('thumbnails');
  const loading     = document.getElementById('loading');
  const progressFill = document.getElementById('progress-fill');

  let pdfDoc = null;
  let totalPages = 0;
  let currentPage = 1;
  let thumbOpen = false;
  let loaded = false;

  document.getElementById('start-btn').addEventListener('click', async () => {
    if (loaded) { showViewer(); return; }
    loading.classList.add('show');
    try {
      const task = pdfjsLib.getDocument(PDF_URL);
      task.onProgress = ({ loaded: l, total }) => {
        if (total) progressFill.style.width = Math.round(l / total * 100) + '%';
      };
      pdfDoc = await task.promise;
      totalPages = pdfDoc.numPages;
      await renderAllPages();
      loaded = true;
      loading.classList.remove('show');
      showViewer();
    } catch(e) {
      loading.classList.remove('show');
      alert('PDFの読み込みに失敗しました。\niishisei.pdf が同じフォルダにあるか確認してください。');
      console.error(e);
    }
  });

  function showViewer() {
    cover.style.display = 'none';
    viewer.style.display = 'flex';
    nav.classList.add('show');
    goTo(1);
  }

  async function renderAllPages() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const viewW = Math.min(window.innerWidth * 0.94, 1100);

    for (let i = 1; i <= totalPages; i++) {
      const page = await pdfDoc.getPage(i);
      const baseVP = page.getViewport({ scale: 1 });
      const scale  = (viewW / baseVP.width) * dpr;
      const vp     = page.getViewport({ scale });

      const canvas = document.createElement('canvas');
      canvas.width  = vp.width;
      canvas.height = vp.height;
      canvas.style.width  = Math.round(vp.width  / dpr) + 'px';
      canvas.style.height = Math.round(vp.height / dpr) + 'px';
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

      const wrap = document.createElement('div');
      wrap.className = 'page-wrap';
      wrap.dataset.page = i;
      wrap.id = 'p' + i;
      wrap.appendChild(canvas);
      viewer.appendChild(wrap);

      // Thumbnail
      const ts = 72 / baseVP.width * dpr;
      const tvp = page.getViewport({ scale: ts });
      const tc = document.createElement('canvas');
      tc.width = tvp.width; tc.height = tvp.height;
      tc.style.width = '72px'; tc.style.height = '52px';
      await page.render({ canvasContext: tc.getContext('2d'), viewport: tvp }).promise;

      const td = document.createElement('div');
      td.className = 'thumb';
      td.dataset.page = i;
      td.appendChild(tc);
      const tn = document.createElement('span');
      tn.className = 'thumb-n'; tn.textContent = i;
      td.appendChild(tn);
      td.addEventListener('click', () => goTo(i));
      thumbsEl.appendChild(td);

      progressFill.style.width = Math.round(i / totalPages * 100) + '%';
    }

    const back = document.createElement('a');
    back.id = 'back-top';
    back.textContent = '▲ 表紙へ戻る';
    back.addEventListener('click', () => {
      viewer.style.display = 'none';
      cover.style.display = 'flex';
      nav.classList.remove('show');
      if (thumbOpen) toggleThumbs();
    });
    viewer.appendChild(back);

    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          const pg = parseInt(e.target.dataset.page);
          if (pg) { currentPage = pg; updateNav(); }
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.page-wrap').forEach(w => io.observe(w));
  }

  function goTo(n) {
    const el = document.getElementById('p' + n);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    if (thumbOpen) toggleThumbs();
  }

  function updateNav() {
    indicator.textContent = currentPage + ' / ' + totalPages;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    document.querySelectorAll('.thumb').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.page) === currentPage);
    });
  }

  prevBtn.addEventListener('click', () => currentPage > 1 && goTo(currentPage - 1));
  nextBtn.addEventListener('click', () => currentPage < totalPages && goTo(currentPage + 1));

  function toggleThumbs() {
    thumbOpen = !thumbOpen;
    thumbsEl.classList.toggle('open', thumbOpen);
    thumbToggle.textContent = thumbOpen ? '閉じる' : '目次';
  }
  thumbToggle.addEventListener('click', toggleThumbs);

  document.addEventListener('keydown', e => {
    if (!loaded) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextBtn.click(); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); prevBtn.click(); }
    if (e.key === 'Escape' && thumbOpen) toggleThumbs();
  });
</script>
</body>
</html>
